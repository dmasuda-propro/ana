<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ANA PP単価計算ツール</title>
  <style>
    :root {
      --ana-blue: #0b57d0;
      --ana-blue-deep: #083b8a;
      --ana-blue-soft: #edf4ff;
      --bg: #f3f6fb;
      --bg-grad-1: #f7f9fd;
      --bg-grad-2: #eef3fb;
      --card: rgba(255, 255, 255, 0.92);
      --text: #172033;
      --text-sub: #5f6b7a;
      --text-soft: #8a95a5;
      --line: #e5ebf4;
      --line-strong: #d8e2f0;
      --danger: #d63a49;
      --danger-bg: #fff3f5;
      --shadow-sm: 0 6px 18px rgba(16,24,40,0.05);
      --shadow-md: 0 12px 32px rgba(16,24,40,0.08);
      --shadow-lg: 0 18px 44px rgba(16,24,40,0.12);
      --radius-xl: 24px;
      --tap: 48px;
      --bottom-safe: calc(104px + env(safe-area-inset-bottom));
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Hiragino Sans", "Yu Gothic UI", sans-serif;
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      background: radial-gradient(circle at top left, #ffffff 0%, transparent 35%),
                  linear-gradient(180deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
      padding-bottom: var(--bottom-safe);
    }
    button, select, input { font: inherit; }

    header {
      position: sticky; top: 0; z-index: 30;
      padding: calc(12px + env(safe-area-inset-top)) 14px 12px;
      background: rgba(7,32,79,0.82);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 28px rgba(5,20,53,0.22);
    }
    .header-inner { display: flex; align-items: center; gap: 12px; max-width: 980px; margin: 0 auto; }
    .logo {
      flex-shrink: 0; min-width: 44px; height: 32px; padding: 0 12px;
      border-radius: 999px; display: inline-flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.96); color: #003b8f;
      font-weight: 900; font-size: 12px; letter-spacing: 1.2px;
    }
    .title-wrap { min-width: 0; flex: 1; }
    .title-wrap h1 { margin: 0; font-size: 16px; font-weight: 850; color: #fff; }
    .title-wrap p { margin: 4px 0 0; font-size: 11px; color: rgba(255,255,255,0.70); font-weight: 600; }

    .tab-bar {
      position: sticky; top: calc(62px + env(safe-area-inset-top)); z-index: 25;
      padding: 10px 12px 8px;
      background: linear-gradient(180deg, rgba(243,246,251,0.94) 0%, rgba(243,246,251,0.88) 100%);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .tab-row { display: flex; gap: 8px; align-items: center; max-width: 980px; margin: 0 auto; }
    .tab-scroll { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; flex: 1; min-width: 0; }
    .tab-scroll::-webkit-scrollbar { display: none; }
    .tab-btn {
      min-height: 40px; padding: 0 12px 0 14px; border: 1px solid transparent;
      border-radius: 999px; background: rgba(255,255,255,0.84); color: #516073;
      font-size: 13px; font-weight: 750; display: inline-flex; align-items: center;
      gap: 8px; white-space: nowrap; flex-shrink: 0; cursor: pointer;
      transition: all .18s ease; box-shadow: 0 4px 12px rgba(15,23,42,0.05);
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #0a4fbf 0%, #083b8a 100%);
      color: #fff; box-shadow: 0 10px 22px rgba(11,87,208,0.22);
    }
    .tab-btn .tab-close {
      width: 18px; height: 18px; border-radius: 999px; display: inline-flex;
      align-items: center; justify-content: center; font-size: 12px;
      background: rgba(0,0,0,0.06); line-height: 1; cursor: pointer;
    }
    .tab-btn.active .tab-close { background: rgba(255,255,255,0.18); }
    .btn-new-tab {
      width: 40px; height: 40px; border: none; border-radius: 999px;
      background: linear-gradient(135deg, #ffffff 0%, #f7faff 100%);
      color: var(--ana-blue); font-size: 22px; line-height: 1;
      box-shadow: var(--shadow-sm); cursor: pointer; flex-shrink: 0;
    }

    .content { max-width: 980px; margin: 0 auto; padding: 10px 12px 28px; }
    .card {
      background: var(--card); border: 1px solid rgba(255,255,255,0.78);
      border-radius: var(--radius-xl); box-shadow: var(--shadow-md);
      padding: 16px 14px; margin-bottom: 14px;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .card-title {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 10px; margin-bottom: 14px;
    }
    .card-title-main {
      font-size: 15px; font-weight: 850; color: #16315f;
      display: flex; align-items: center; gap: 10px;
    }
    .card-title-main::before {
      content: ""; width: 7px; height: 20px; border-radius: 999px;
      background: linear-gradient(180deg, #0b57d0 0%, #083b8a 100%);
      display: inline-block; box-shadow: 0 4px 10px rgba(11,87,208,0.22);
    }
    .card-sub { font-size: 11px; color: var(--text-soft); font-weight: 700; flex-shrink: 0; padding-top: 3px; }

    .segment-list { display: grid; gap: 12px; }
    .segment-card {
      border: 1px solid var(--line); border-radius: 20px;
      background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
      padding: 12px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }
    .segment-card.intl { border-color: #ffd5b8; background: linear-gradient(180deg, #fffaf7 0%, #fff7f3 100%); }
    .segment-card.intl-dom { border-color: #b8ddb8; background: linear-gradient(180deg, #f7fff7 0%, #f3fff3 100%); }

    .segment-top {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; margin-bottom: 10px;
    }
    .segment-label {
      font-size: 12px; font-weight: 850; border-radius: 999px; padding: 5px 11px;
    }
    .segment-label.domestic { color: var(--ana-blue); background: var(--ana-blue-soft); border: 1px solid #dbe8ff; }
    .segment-label.intl { color: #c04a10; background: #fff0e8; border: 1px solid #ffc8a0; }
    .segment-label.intl-dom { color: #2a7a10; background: #f0ffe8; border: 1px solid #b0e890; }

    .seg-type-row { display: flex; gap: 5px; margin-bottom: 10px; }
    .seg-type-btn {
      flex: 1; min-height: 32px; border-radius: 999px;
      border: 1.5px solid var(--line-strong); background: #f9fbff;
      color: var(--text-sub); font-size: 11px; font-weight: 750;
      cursor: pointer; white-space: nowrap; padding: 0 8px;
      transition: all .15s ease;
    }
    .seg-type-btn.active-dom { background: var(--ana-blue-soft); color: var(--ana-blue); border-color: #bfd5ff; }
    .seg-type-btn.active-intl { background: #fff0e8; color: #c04a10; border-color: #ffc8a0; }
    .seg-type-btn.active-idom { background: #f0ffe8; color: #2a7a10; border-color: #b0e890; }

    .btn-del {
      width: 34px; height: 34px; border: 1px solid #f0d7dc; border-radius: 999px;
      background: var(--danger-bg); color: #c64654; font-size: 15px;
      cursor: pointer; flex-shrink: 0;
    }
    .btn-del.placeholder { visibility: hidden; pointer-events: none; }

    .field-grid { display: grid; gap: 10px; }
    .field label {
      display: block; font-size: 12px; font-weight: 750;
      color: var(--text-sub); margin-bottom: 6px;
    }
    select, input[type="number"] {
      width: 100%; min-height: var(--tap); border: 1.5px solid var(--line-strong);
      border-radius: 14px; background: #f9fbff; padding: 0 40px 0 14px;
      font-size: 16px; font-weight: 600; color: var(--text); outline: none;
      transition: border-color .18s, box-shadow .18s, background .18s;
      appearance: none; -webkit-appearance: none;
    }
    select {
      background-image:
        linear-gradient(180deg, #ffffff 0%, #edf2ff 100%),
        url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 16 16' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M4 6l4 4 4-4' fill='none' stroke='%23566780' stroke-width='1.7' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: left 0 top 0, right 14px center;
      background-size: auto, 14px;
    }
    select:focus, input[type="number"]:focus {
      border-color: var(--ana-blue); background: white;
      box-shadow: 0 0 0 2px rgba(11,87,208,0.14);
    }

    .seg-details { margin-top: 10px; }
    .seg-summary {
      list-style: none; cursor: pointer; font-size: 11px; font-weight: 750;
      color: var(--ana-blue); display: inline-flex; align-items: center; gap: 4px;
    }
    .seg-summary::-webkit-details-marker { display: none; }
    .segment-metrics {
      margin-top: 6px; padding: 12px; border-radius: 18px;
      background: linear-gradient(180deg, #f7faff 0%, #f3f7ff 100%);
      border: 1px solid #dfe9fb;
    }
    .formula-line {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 12px; padding: 5px 0;
    }
    .formula-op-row { text-align: center; font-size: 13px; font-weight: 900; color: #8090a7; padding: 2px 0; }
    .formula-label { font-size: 11px; font-weight: 750; color: #6a7688; }
    .formula-value { font-size: 14px; font-weight: 850; color: #17335c; text-align: right; }
    .formula-value.na { color: #c23a3a; font-size: 12px; }
    .formula-value.empty { color: #bcc5d1; }
    .formula-value.pp { color: #0b57d0; font-size: 17px; }
    .segment-formula-note { margin-top: 9px; font-size: 10px; color: #7e8897; font-weight: 650; line-height: 1.55; }

    .seg-options { margin-top: 8px; }
    .roundtrip-toggle {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text-sub); font-weight: 650;
    }
    .roundtrip-toggle input { width: 18px; height: 18px; }

    .btn-add, .btn-add-amount {
      width: 100%; min-height: 48px; border-radius: 16px;
      font-size: 14px; font-weight: 850; cursor: pointer;
    }
    .btn-add {
      margin-top: 14px; border: none; color: white;
      background: linear-gradient(135deg, #0b57d0 0%, #083b8a 100%);
      box-shadow: 0 12px 24px rgba(11,87,208,0.20);
    }
    .btn-add-amount {
      margin-top: 12px; border: 1.5px dashed #bfd0ee;
      background: #f8fbff; color: var(--ana-blue);
    }
    .empty-msg { color: #98a2b3; text-align: center; padding: 22px 0; font-size: 14px; font-weight: 650; }

    .amount-list { display: grid; gap: 10px; }
    .amount-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: end; }
    .amount-wrap { position: relative; }
    .amount-wrap input { padding-right: 44px; }
    .yen { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); color: #8b95a7; font-size: 13px; font-weight: 800; pointer-events: none; }

    .amount-total-box {
      margin-top: 14px; padding: 14px; border-radius: 18px;
      background: linear-gradient(180deg, #fbfdff 0%, #f5f9ff 100%);
      border: 1px solid #e1eaf7; display: flex; align-items: center;
      justify-content: space-between; gap: 12px;
    }
    .amount-total-label { font-size: 12px; font-weight: 800; color: var(--text-sub); }
    .amount-total-value { font-size: 24px; font-weight: 900; color: #16315f; letter-spacing: -0.02em; }

    .results { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 14px; }
    .result-box {
      border-radius: 18px; padding: 15px 12px; text-align: center;
      background: linear-gradient(180deg, #fbfdff 0%, #f6f9ff 100%);
      border: 1px solid #e3ebfb;
    }
    .result-box.hl {
      background: linear-gradient(135deg, #0a4fbf 0%, #083b8a 100%);
      border-color: transparent; box-shadow: 0 14px 28px rgba(11,87,208,0.20);
    }
    .r-label { font-size: 11px; color: #7d8797; margin-bottom: 8px; font-weight: 850; letter-spacing: .5px; text-transform: uppercase; }
    .result-box.hl .r-label { color: rgba(255,255,255,0.70); }
    .r-val { font-size: 26px; font-weight: 900; color: #16315f; line-height: 1; letter-spacing: -0.03em; }
    .result-box.hl .r-val { color: white; }
    .r-unit { font-size: 11px; color: #98a2b3; margin-top: 6px; font-weight: 750; }
    .result-box.hl .r-unit { color: rgba(255,255,255,0.60); }

    .bottom-summary {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 40;
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(243,246,251,0) 0%, rgba(243,246,251,0.88) 18%, rgba(243,246,251,1) 100%);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .bottom-summary-inner {
      max-width: 980px; margin: 0 auto; background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.88); border-radius: 22px;
      box-shadow: var(--shadow-lg); padding: 10px;
      display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    .bottom-item {
      text-align: center; background: linear-gradient(180deg, #fbfdff 0%, #f5f9ff 100%);
      border-radius: 16px; padding: 10px 6px; border: 1px solid #e7eef9;
    }
    .bottom-item.hl { background: linear-gradient(135deg, #0a4fbf 0%, #083b8a 100%); border-color: transparent; }
    .bottom-k { font-size: 10px; font-weight: 850; color: #7d8797; letter-spacing: .4px; text-transform: uppercase; margin-bottom: 6px; }
    .bottom-item.hl .bottom-k { color: rgba(255,255,255,0.66); }
    .bottom-v { font-size: 18px; font-weight: 900; color: #16315f; line-height: 1.1; letter-spacing: -0.02em; }
    .bottom-item.hl .bottom-v { color: white; }
    .bottom-u { font-size: 10px; color: #98a2b3; margin-top: 4px; font-weight: 750; }
    .bottom-item.hl .bottom-u { color: rgba(255,255,255,0.58); }

    .amount-total-value, .r-val, .bottom-v, .formula-value { font-variant-numeric: tabular-nums; }

    .intl-note {
      font-size: 10px; color: #a06040; background: #fff7f0;
      border: 1px solid #ffd8b8; border-radius: 10px;
      padding: 7px 10px; margin-top: 8px; line-height: 1.5;
    }
    .bonus-section { margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--line); }
    .bonus-total {
      margin-top: 10px; padding: 8px 12px; border-radius: 12px;
      background: linear-gradient(135deg, #eaf3ff 0%, #e0edff 100%);
      border: 1px solid #c8dcf8; font-size: 12px; font-weight: 800; color: #1a3d7a;
      text-align: center;
    }
    .results-miles { margin-top: 10px; }
    .seg-miles-row { margin-top: 8px; padding: 6px 10px; border-radius: 12px;
      background: #f0fff8; border: 1px solid #b8e8d0;
      font-size: 11px; font-weight: 750; color: #1a6b44;
      display: flex; justify-content: space-between; }
    .bottom-summary-inner { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    @media (hover: none) and (pointer: coarse) {
      select, input[type="number"] { transition: border-color .14s ease, background .14s ease; }
      select:focus, input[type="number"]:focus { box-shadow: none; }
    }
    @media (min-width: 769px) {
      body { padding-bottom: 28px; }
      .tab-bar { top: calc(68px + env(safe-area-inset-top)); padding-top: 12px; }
      .content { padding: 18px 18px 28px; }
      .card { padding: 20px 18px; }
      .field-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .results { grid-template-columns: repeat(3, 1fr); }
      .bottom-summary { display: none; }
      .bottom-summary-inner { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }
  </style>
</head>

<header>
  <div class="header-inner">
    <div class="logo">ANA</div>
    <div class="title-wrap">
      <h1>PP単価計算ツール</h1>
      <p>国内線 / 国際線 対応</p>
    </div>
  </div>
</header>

<div class="tab-bar">

    <div id="tabButtons" class="tab-scroll"></div>
    <button class="btn-new-tab" onclick="newTab()" title="新しいタブ">＋</button>
  </div>
</div>

<div id="tabContent"></div>

<div class="bottom-summary">
  <div class="bottom-summary-inner">
    <div class="bottom-item">
      <div class="bottom-k">合計 PP</div>
      <div class="bottom-v" id="b-totalPP">-</div>
      <div class="bottom-u">ポイント</div>
    </div>
    <div class="bottom-item">
      <div class="bottom-k">合計マイル</div>
      <div class="bottom-v" id="b-totalMiles">-</div>
      <div class="bottom-u">マイル</div>
    </div>
    <div class="bottom-item">
      <div class="bottom-k">旅行総額</div>
      <div class="bottom-v" id="b-amount">-</div>
      <div class="bottom-u">円</div>
    </div>
    <div class="bottom-item hl">
      <div class="bottom-k">PP 単価</div>
      <div class="bottom-v" id="b-rate">-</div>
      <div class="bottom-u">円 / PP</div>
    </div>
  </div>
</div>

const PRIORITY = ["東京(羽田)","東京(成田)","大阪(伊丹)","大阪(関西)","大阪(神戸)",
  "新千歳","名古屋(中部)","福岡","那覇","石垣","宮古島"];
function sortAp(arr) {
  return [...arr].sort((a,b) => {
    const ai=PRIORITY.indexOf(a), bi=PRIORITY.indexOf(b);
    if (ai>=0&&bi>=0) return ai-bi;
    if (ai>=0) return -1; if (bi>=0) return 1;
    return a.localeCompare(b,"ja");
  });
}

function getMiles(a, b) {
  for (const [x,y,m] of routeData) {
    if ((x===a&&y===b)||(x===b&&y===a)) return m;

  return null;
}
function getDests(ap) {
  const d=[];
  for (const [a,b] of routeData) {
    if (a===ap) d.push(b); else if (b===ap) d.push(a);
  }
  return sortAp(d);
}

function mkSeg(params={}) {
  const {
    type='domestic', ap1='', ap2='',
    seat='エコノミークラス', fare='スタンダード',
    intlOrigin='東京', intlDest='',
    bookClass='Y', roundtrip=true
  } = params;
  return { id:ST.nextSegId++, type, ap1, ap2, seat, fare, intlOrigin, intlDest, bookClass, roundtrip };
}

function mkTab(name, segDefs=[], amounts=[""]) {
  const id = ST.nextId++;
  const segments = segDefs.map(s => mkSeg(s));
  const amts = Array.isArray(amounts) ? (amounts.length ? amounts : [""]) : [amounts];
  return { id, name, segments, amounts: amts, statusId: getInitialStatusId(), cardId: getInitialCardId() };
}

function getTab(id) { return ST.tabs.find(t => t.id===(id ?? ST.activeId)); }

function refreshTabName(tab) {
  const segs = tab.segments.filter(s =>
    s.type==='international' ? s.intlDest : (s.ap1 && s.ap2)
  );
  if (!segs.length) { tab.name="新規タブ"; return; }
  const stops=[];
  segs.forEach((seg,i) => {
    if (seg.type==='international') {
      if (i===0) stops.push(seg.intlDest);
      stops.push(seg.intlOrigin.replace('（関西）','').replace('（中部）',''));
    } else {
      if (i===0) stops.push(seg.ap1);
      stops.push(seg.ap2);
    }
  });
  tab.name = stops.join("→");
}

function updateSeg(segId, field, value) {
  const tab=getTab();
  const seg=tab.segments.find(s=>s.id===segId);
  if (!seg) return;
  if (field==='type') {
    seg.type=value;
    if (value==='domestic' || value==='intl_domestic') {
      seg.intlDest='';
    } else {
      seg.ap1=''; seg.ap2='';
    }
  } else if (field==='ap1' && seg.type!=='international') {
    seg.ap1=value;
    if (!getDests(value).includes(seg.ap2)) seg.ap2='';
  } else if (field==='intlOrigin') {
    seg.intlOrigin=value;
    const routes=getIntlRoutes(value);
    if (!routes.find(r=>r.dest===seg.intlDest)) seg.intlDest='';
  } else {
    seg[field]=value;
  }
  refreshTabName(tab); renderTabs(); renderContent();
}

// ─── Flight mile calculation ──────────────────────────────────────────────────
// フライトマイル = 区間基本マイレージ × 積算率（ボーナス除く）
function calcFlightMiles(seg) {
  if (seg.type==='domestic') {
    if (!seg.ap1||!seg.ap2) return null;
    const m=getMiles(seg.ap1,seg.ap2); if (m===null) return null;
    const r=getDomRate(seg.fare,seg.seat); if (r===null) return null;
    return Math.round(m*r/100);
  }
  if (seg.type==='international') {
    if (!seg.intlOrigin||!seg.intlDest) return null;
    const route=getIntlRoute(seg.intlOrigin,seg.intlDest); if (!route) return null;
    const r=INT_CLASS_RATE[seg.bookClass]; if (r===undefined) return null;
    return Math.round(route.miles*r/100);
  }
  if (seg.type==='intl_domestic') {
    if (!seg.ap1||!seg.ap2) return null;
    const m=getMiles(seg.ap1,seg.ap2); if (m===null) return null;
    const r=INTL_DOM_RATE[seg.bookClass]; if (r===undefined) return null;
    return Math.round(m*r/100);
  }
  return null;
}

function onBonusChange(field, val) {
  const tab=getTab(); if (!tab) return;
  tab[field]=val;
  updateUrlParams(tab.statusId, tab.cardId);
  renderContent();
}

}
function getInitialCardId() {
  const id = getQueryParams().get('card');
  return CARD_OPTIONS.some(c => c.id === id) ? id : 'ana_premium';
}
function updateUrlParams(statusId, cardId) {
  const url = new URL(window.location.href);
  url.searchParams.set('status', statusId);
  url.searchParams.set('card', cardId);
  window.history.replaceState({}, '', url);
}

function getBonusRate(statusId, cardId) {
  const status = STATUS_OPTIONS.find(s => s.id === statusId);
  const card = CARD_OPTIONS.find(c => c.id === cardId);
  const statusRate = status ? status.base : 0;
  const cardRate = card ? card.bonus : 0;
  const isPremiumMember = statusId !== 'regular';

  if (!isPremiumMember) {
    return cardRate;
  }

  const hasGoldOrPremiumCard = 
    cardId === 'ana_gold' || 
    cardId === 'ana_premium' || 
    cardId === 'sfc_gold' || 
    cardId === 'sfc_premium';
  
  const statusRateWithCardBonus = hasGoldOrPremiumCard ? statusRate + 5 : statusRate;
  return Math.max(statusRateWithCardBonus, cardRate);
}

// ─── PP calculation ───────────────────────────────────────────────────────────
function calcPP(seg) {
  if (seg.type==='domestic') {
    if (!seg.ap1||!seg.ap2) return null;
    const m=getMiles(seg.ap1,seg.ap2); if (m===null) return null;
    const r=getDomRate(seg.fare,seg.seat); if (r===null) return null;
    return Math.round(m*r/100*2.0) + getDomBoardPt(seg.fare,seg.seat);
  }
  if (seg.type==='international') {
    if (!seg.intlOrigin||!seg.intlDest) return null;
    const route=getIntlRoute(seg.intlOrigin,seg.intlDest); if (!route) return null;
    const r=INT_CLASS_RATE[seg.bookClass]; if (r===undefined) return null;
    const bp=INT_BOARD_PT[seg.bookClass]??0;
    return Math.round(route.miles*r/100*route.mult) + bp;
  }
  if (seg.type==='intl_domestic') {
    if (!seg.ap1||!seg.ap2) return null;
    const m=getMiles(seg.ap1,seg.ap2); if (m===null) return null;
    const r=INTL_DOM_RATE[seg.bookClass]; if (r===undefined) return null;
    const bp=INTL_DOM_BOARD_PT[seg.bookClass]??0; // 2026/5/19以降: F/A/Y/B/M→400pt
    return Math.round(m*r/100*2.0)+bp;
  }
  return null;
}

// ─── Rendering helpers ────────────────────────────────────────────────────────
function h(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function apOpts(list, sel) {
  return list.map(a=>`<option value="${h(a)}"${a===sel?" selected":""}>${h(a)}</option>`).join("");
}

function renderTabs() {
  document.getElementById("tabButtons").innerHTML = ST.tabs.map(tab=>`
    <button class="tab-btn${tab.id===ST.activeId?" active":""}" onclick="switchTab(${tab.id})">
      ${h(tab.name)}
      ${ST.tabs.length>1?`<span class="tab-close" onclick="event.stopPropagation();deleteTab(${tab.id})">×</span>`:""}
    </button>`).join("");
}

function renderSegCard(seg, index, total) {
  const type = seg.type;
  const cardClass = type==='international'?'intl':(type==='intl_domestic'?'intl-dom':'');
  const labelClass = cardClass||'domestic';
  const labelText = type==='international'?'国際線':(type==='intl_domestic'?'国際線発券/国内区間':'国内線');

  // Calculate values for formula display
  let miles=null, rate=null, mult=null, boardPt=null, pp=null, routeNA=false;
  if (type==='domestic') {
    if (seg.ap1&&seg.ap2) {
      miles=getMiles(seg.ap1,seg.ap2);
      rate=getDomRate(seg.fare,seg.seat);
      mult=2.0;
      boardPt=rate!==null?getDomBoardPt(seg.fare,seg.seat):null;
      if (miles!==null&&rate!==null) pp=Math.round(miles*rate/100*mult)+boardPt;
      if (miles===null) routeNA=true;
    }
  } else if (type==='international') {
    if (seg.intlOrigin&&seg.intlDest) {
      const route=getIntlRoute(seg.intlOrigin,seg.intlDest);
      if (route) {
        miles=route.miles; mult=route.mult;
        rate=INT_CLASS_RATE[seg.bookClass];
        boardPt=INT_BOARD_PT[seg.bookClass]??0;
        if (rate!==undefined) pp=Math.round(miles*rate/100*mult)+boardPt;
      } else { routeNA=true; }
    }
  } else { // intl_domestic
    if (seg.ap1&&seg.ap2) {
      miles=getMiles(seg.ap1,seg.ap2);
      rate=INTL_DOM_RATE[seg.bookClass];
      mult=2.0;
      boardPt=INTL_DOM_BOARD_PT[seg.bookClass]??0;
      if (miles!==null&&rate!==undefined) pp=Math.round(miles*rate/100*mult)+boardPt;
      if (miles===null) routeNA=true;
    }
  }
  const ppDisp = pp!==null ? pp*(seg.roundtrip?2:1) : null;

  // Type selector buttons
  const typeRow = `
    <div class="seg-type-row">
      <button class="seg-type-btn${type==='domestic'?' active-dom':''}" onclick="updateSeg(${seg.id},'type','domestic')">国内線</button>
      <button class="seg-type-btn${type==='international'?' active-intl':''}" onclick="updateSeg(${seg.id},'type','international')">国際線</button>
      <button class="seg-type-btn${type==='intl_domestic'?' active-idom':''}" onclick="updateSeg(${seg.id},'type','intl_domestic')">国際券/国内区間</button>
    </div>`;

  // Fields based on type
  let fields='';
  if (type==='domestic') {
    const dests=seg.ap1?getDests(seg.ap1):ALL_AIRPORTS;
    fields=`
      <div class="field"><label>出発空港</label>
        <select onchange="updateSeg(${seg.id},'ap1',this.value)">
          <option value="">選択してください</option>${apOpts(ALL_AIRPORTS,seg.ap1)}
        </select></div>
      <div class="field"><label>到着空港</label>
        <select onchange="updateSeg(${seg.id},'ap2',this.value)">
          <option value="">選択してください</option>${apOpts(dests,seg.ap2)}
        </select></div>
      <div class="field"><label>座席クラス</label>
        <select onchange="updateSeg(${seg.id},'seat',this.value)">
          <option value="エコノミークラス"${seg.seat==='エコノミークラス'?' selected':''}>エコノミークラス</option>
          <option value="ファーストクラス"${seg.seat==='ファーストクラス'?' selected':''}>ファーストクラス</option>
        </select></div>
      <div class="field"><label>予約クラス・運賃</label>
        <select onchange="updateSeg(${seg.id},'fare',this.value)">
          ${FARES.map(f=>`<option value="${h(f)}"${f===seg.fare?' selected':''}>${h(f)}</option>`).join('')}
        </select></div>`;
  } else if (type==='international') {
    const routes=getIntlRoutes(seg.intlOrigin);
    fields=`
      <div class="field"><label>出発地（日本側）</label>
        <select onchange="updateSeg(${seg.id},'intlOrigin',this.value)">
          ${INT_ORIGINS.map(o=>`<option value="${h(o)}"${o===seg.intlOrigin?' selected':''}>${h(o)}</option>`).join('')}
        </select></div>
      <div class="field"><label>海外都市</label>
        <select onchange="updateSeg(${seg.id},'intlDest',this.value)">
          <option value="">選択してください</option>
          ${routes.map(r=>`<option value="${h(r.dest)}"${r.dest===seg.intlDest?' selected':''}>${h(r.dest)}（×${r.mult}）</option>`).join('')}
        </select></div>
      <div class="field"><label>予約クラス</label>
        <select onchange="updateSeg(${seg.id},'bookClass',this.value)">
          ${injectSelectedIntl(INT_CLASSES_HTML, seg.bookClass)}
        </select></div>`;
  } else { // intl_domestic
    const dests=seg.ap1?getDests(seg.ap1):ALL_AIRPORTS;
    fields=`
      <div class="field"><label>出発空港</label>
        <select onchange="updateSeg(${seg.id},'ap1',this.value)">
          <option value="">選択してください</option>${apOpts(ALL_AIRPORTS,seg.ap1)}
        </select></div>
      <div class="field"><label>到着空港</label>
        <select onchange="updateSeg(${seg.id},'ap2',this.value)">
          <option value="">選択してください</option>${apOpts(dests,seg.ap2)}
        </select></div>
      <div class="field"><label>予約クラス</label>
        <select onchange="updateSeg(${seg.id},'bookClass',this.value)">
          ${injectSelectedIntl(IDOM_CLASSES_HTML, seg.bookClass)}
        </select></div>
      <div class="intl-note">国際航空券発券の国内区間（2026/5/19以降）：F/A→400pt、Y/B/M→400pt、U/H/Q/V/W/S/L/K→0pt。PPは通常通り積算（路線倍率×2.0）。</div>`;
  }

  // Miles (segment)
  const segMiles = calcFlightMiles(seg);
  const segMilesDisp = segMiles !== null ? segMiles * (seg.roundtrip ? 2 : 1) : null;

  // Formula display
  const fv = (v, cls='') => `<div class="formula-value${cls?' '+cls:''}">${v}</div>`;
  const multLabel = type==='international'
    ? `×${mult}（${mult===1.5?'アジア/オセアニア・ウラジオストク':'その他'}）`
    : '×2.0（国内線）';
  const bpLabel = boardPt===null ? '-' : boardPt.toLocaleString();

  const formula = `
    <details class="seg-details">
      <summary class="seg-summary">計算式を表示</summary>
      <div class="segment-metrics">
        <div class="formula-line">
          <div class="formula-label">区間基本マイレージ</div>
          ${fv(miles===null?(routeNA?'路線なし':'-'):(miles?.toLocaleString()||'-'), miles===null?(routeNA?'na':'empty'):'') }
        </div>
        <div class="formula-op-row">×</div>
        <div class="formula-line">
          <div class="formula-label">積算率</div>
          ${fv(rate===undefined||rate===null?'-':`${rate}%`, (rate===undefined||rate===null)?'empty':'')}
        </div>
        <div class="formula-op-row">×</div>
        <div class="formula-line">
          <div class="formula-label">路線倍率</div>
          ${fv(mult===null?'-':multLabel)}
        </div>
        <div class="formula-op-row">＋</div>
        <div class="formula-line">
          <div class="formula-label">搭乗ポイント</div>
          ${fv(bpLabel, boardPt===null?'empty':'')}
        </div>
        <div class="formula-op-row">＝</div>
        <div class="formula-line">
          <div class="formula-label">PP${seg.roundtrip?'（往復）':''}</div>
          ${fv(ppDisp===null?'-':ppDisp.toLocaleString(), ppDisp===null?'empty':'pp')}
        </div>
        <hr style="margin:8px 0;border:none;border-top:1px dashed #d8e4f4;">
        <div class="formula-line">
          <div class="formula-label">フライトマイル${seg.roundtrip?'（往復）':''}</div>
          ${fv(segMilesDisp===null?'-':segMilesDisp.toLocaleString(), segMilesDisp===null?'empty':'')}
        </div>
        <div class="segment-formula-note">PP ＝ 基本マイレージ × 積算率 × 路線倍率 ＋ 搭乗ポイント<br>フライトマイル ＝ 基本マイレージ × 積算率（ボーナス除く）</div>
      </div>
    </details>`;

  return `
    <div class="segment-card${cardClass?' '+cardClass:''}">
      <div class="segment-top">
        <div class="segment-label ${labelClass}">区間 ${index+1}　${labelText}</div>
        ${total>1
          ?`<button class="btn-del" onclick="removeSegment(${seg.id})">✕</button>`
          :`<div class="btn-del placeholder">✕</div>`}
      </div>
      ${typeRow}
      <div class="field-grid">${fields}</div>
      <div class="seg-options">
        <label class="roundtrip-toggle">
          <input type="checkbox" ${seg.roundtrip?"checked":""} onchange="updateSeg(${seg.id},'roundtrip',this.checked)">
          <span>この区間を往復として計算</span>
        </label>
      </div>
      ${formula}
    </div>`;
}

function renderContent() {
  const tab=getTab();
  if (!tab) { document.getElementById("tabContent").innerHTML=""; updateResult(); return; }

  const totalPP = tab.segments.reduce((s,seg)=>{
    const base=calcPP(seg); if (base===null) return s;
    return s + base*(seg.roundtrip?2:1);
  },0);
  const amounts=(tab.amounts&&tab.amounts.length)?tab.amounts:[""];
  const totalAmount=amounts.reduce((s,a)=>s+(parseFloat(a)||0),0);
  const ppRate=(totalAmount>0&&totalPP>0)?(totalAmount/totalPP).toFixed(1):"-";
  const statusId = tab.statusId || 'regular';
  const cardId = tab.cardId || 'amc_partner';
  const totalBonusRate = getBonusRate(statusId, cardId);
  const baseFlightMiles = tab.segments.reduce((s,seg)=>{
    const m=calcFlightMiles(seg); if (m===null) return s;
    return s + m*(seg.roundtrip?2:1);
  },0);
  const bonusMiles = Math.round(baseFlightMiles * totalBonusRate / 100);
  const totalMiles = baseFlightMiles + bonusMiles;

  document.getElementById("tabContent").innerHTML=`
    <div class="content">
      <div class="card">
        <div class="card-title">
          <div class="card-title-main">フライト区間</div>
        </div>
        <div class="segment-list">
          ${tab.segments.length
            ? tab.segments.map((seg,i)=>renderSegCard(seg,i,tab.segments.length)).join("")
            : `<div class="empty-msg">区間を追加してください</div>`}
        </div>
        <button class="btn-add" onclick="addSegment()">＋ 区間を追加</button>
      </div>
      <div class="card">
        <div class="card-title">
          <div class="card-title-main">PP単価計算</div>
          <div class="card-sub">旅行代金から算出</div>
        </div>
        <div class="amount-list">
          ${amounts.map((amt,idx)=>`
            <div class="amount-row">
              <div class="amount-field">
                <label>旅行総額${amounts.length>1?` ${idx+1}`:""}</label>
                <div class="amount-wrap">
                  <input type="number" placeholder="30000" min="0" value="${h(amt)}"
                    oninput="onAmountInput(${idx},this.value)">
                  <span class="yen">円</span>
                </div>
              </div>
              ${amounts.length>1
                ?`<button class="btn-del" onclick="removeAmount(${idx})">✕</button>`
                :`<div class="btn-del placeholder">✕</div>`}
            </div>`).join("")}
        </div>
        <button class="btn-add-amount" onclick="addAmount()">＋ 金額を追加</button>
        <div class="amount-total-box">
          <div class="amount-total-label">合計金額</div>
          <div class="amount-total-value">${totalAmount>0?totalAmount.toLocaleString():"-"}</div>
        </div>
        <div class="results">
          <div class="result-box">
            <div class="r-label">合計 PP</div>
            <div class="r-val" id="r-totalPP">${totalPP.toLocaleString()}</div>
            <div class="r-unit">ポイント</div>
          </div>
          <div class="result-box">
            <div class="r-label">旅行総額</div>
            <div class="r-val" id="r-amount">${totalAmount>0?totalAmount.toLocaleString():"-"}</div>
            <div class="r-unit">円</div>
          </div>
          <div class="result-box hl">
            <div class="r-label">PP 単価</div>
            <div class="r-val" id="r-rate">${ppRate}</div>
            <div class="r-unit">円 / PP</div>
          </div>
        </div>
        <div class="bonus-section">
          <div class="card-title" style="margin-bottom:10px;">
            <div class="card-title-main">ボーナスマイル設定</div>
          </div>
          <div class="field-grid">
            <div class="field"><label>会員ランク</label>
              <select onchange="onBonusChange('statusId',this.value)">
                ${STATUS_OPTIONS.map(o=>`<option value="${h(o.id)}"${o.id===statusId?' selected':''}>${h(o.label)}（+${o.base}%）</option>`).join('')}
              </select>
            </div>
            <div class="field"><label>カード種別</label>
              <select onchange="onBonusChange('cardId',this.value)">
                ${CARD_OPTIONS.map(o=>`<option value="${h(o.id)}"${o.id===cardId?' selected':''}>${h(o.label)}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="bonus-total">適用ボーナス：+${totalBonusRate}%</div>
        </div>
        <div class="results results-miles">
          <div class="result-box">
            <div class="r-label">基本マイル</div>
            <div class="r-val" id="r-baseMiles">${baseFlightMiles.toLocaleString()}</div>
            <div class="r-unit">マイル</div>
          </div>
          <div class="result-box">
            <div class="r-label">ボーナスマイル +${totalBonusRate}%</div>
            <div class="r-val" id="r-bonusMiles">${bonusMiles.toLocaleString()}</div>
            <div class="r-unit" id="r-bonusLabel">マイル</div>
          </div>
          <div class="result-box hl">
            <div class="r-label">合計マイル</div>
            <div class="r-val" id="r-totalMiles">${totalMiles.toLocaleString()}</div>
            <div class="r-unit">マイル</div>
          </div>
        </div>
      </div>
    </div>`;

  attachFocusScrollHandlers();
  updateResult();
}

function updateResult() {
  const tab=getTab();
  const totalPP=tab?tab.segments.reduce((s,seg)=>{
    const base=calcPP(seg); if(base===null) return s;
    return s+base*(seg.roundtrip?2:1);
  },0):0;
  const amounts=tab&&tab.amounts&&tab.amounts.length?tab.amounts:[""];
  const totalAmount=amounts.reduce((s,a)=>s+(parseFloat(a)||0),0);
  const ppRate=(totalAmount>0&&totalPP>0)?(totalAmount/totalPP).toFixed(1):"-";
  const totalBonusRate=getBonusRate(tab?.statusId||'regular', tab?.cardId||'amc_partner');
  const baseFlightMiles=tab?tab.segments.reduce((s,seg)=>{
    const m=calcFlightMiles(seg); if(m===null) return s;
    return s+m*(seg.roundtrip?2:1);
  },0):0;
  const bonusMiles=Math.round(baseFlightMiles*totalBonusRate/100);
  const totalMiles=baseFlightMiles+bonusMiles;
  const setText=(id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=v; };
  setText("r-totalPP",totalPP.toLocaleString());
  setText("r-amount",totalAmount>0?totalAmount.toLocaleString():"-");
  setText("r-rate",ppRate);
  setText("r-baseMiles",baseFlightMiles.toLocaleString());
  setText("r-bonusMiles",bonusMiles.toLocaleString());
  setText("r-bonusLabel",`マイル（+${totalBonusRate}%）`);
  setText("r-totalMiles",totalMiles.toLocaleString());
  setText("b-totalPP",totalPP.toLocaleString());
  setText("b-totalMiles",totalMiles.toLocaleString());
  setText("b-amount",totalAmount>0?totalAmount.toLocaleString():"-");
  setText("b-rate",ppRate);
}

function scrollFieldIntoView(el) {
  if (!el||typeof window==="undefined") return;
  const rect=el.getBoundingClientRect();
  const vh=window.innerHeight||document.documentElement.clientHeight||0;
  const offset=140;
  if (rect.top>=offset&&rect.bottom<=vh) return;
  const currentY=window.pageYOffset||document.documentElement.scrollTop||0;
  window.scrollTo({top:Math.max(currentY+rect.top-offset,0),behavior:"smooth"});
}
function attachFocusScrollHandlers() {
  const root=document.getElementById("tabContent"); if (!root) return;
  root.querySelectorAll(".segment-card select,.segment-card input[type='number'],.amount-wrap input[type='number']")
    .forEach(el=>el.addEventListener("focus",()=>{ setTimeout(()=>scrollFieldIntoView(el.closest(".segment-card")||el.closest(".amount-row")||el),80); },{passive:true}));
}

// ─── Boot ──────────────────────────────────────────────────────────────────────
initDefaults();
renderTabs();
renderContent();
</script>
